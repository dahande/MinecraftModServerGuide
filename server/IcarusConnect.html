<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Icarus サーバー接続手順 – のんびりサバイバル鯖</title>
  <link rel="stylesheet" href="../cssFile/Styles.css" />

<body>
<main class="wrapper">

<header>
  <h1>Icarus サーバー接続手順</h1>

  <div class="meta">
    <div>対象: Icarus (Steam版)</div>
    <div>最終更新: 2026-03-15</div>
  </div>

  <p class="backlink">
    <a href="../index.html" class="btn">← タイトルへ戻る</a>
  </p>

  <div class="hr"></div>
</header>


<!-- Step1 -->
<section class="step">
  <div class="step-title">ゲームを起動</div>

  <p class="step-desc">
   ゲームを起動して <b>加入</b> を選択します。
  </p>

  <figure class="frame">
    <img src="../image/img/Icarus_img/step1.png" alt="ゲームを起動画面">
  </figure>
</section>


<!-- Step2 -->
<section class="step">
  <div class="step-title">サーバー接続</div>

  <p class="step-desc">
    <b>専用サーバー </b> を選択します。
  </p>

  <figure class="frame">
    <img src="../image/img/Icarus_img/step2.png" alt="Icarus起動画面">
  </figure>
</section>


<!-- Step3 -->
<section class="step">
  <div class="step-title">直接接続</div>

  <p class="step-desc">
    <b>直接接続</b> を選択し、サーバー情報を入力します。
  </p>

  <figure class="frame">
    <img src="../image/img/Icarus_img/step3.png" alt="直接接続">
  </figure>
</section>

<!-- サーバー情報 -->
<section class="step">
  <div class="step-title">サーバー情報</div>

  <p class="step-desc">
    以下のサーバーを探して参加してください。
  </p>

  <div class="download-card">

    <div class="download-card__title">
      のんびり Icarus サーバー
    </div>

    <div class="download-card__actions">

      <div><b>サーバー名:</b> 青森</div>
      <div><b>IP:</b> 178.212.33.15</div>
      <div><b>PW:</b> 123</div>

    </div>

  </div>
</section>

<footer class="footer">
© のんびりサバイバル鯖 / だぁ～さん

</main>
